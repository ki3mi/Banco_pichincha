<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transacciones — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="appToast" class="toast align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastBody">OK</div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-banco">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="dashboard.html"><i class="bi bi-bank me-2"></i>MI BANCO</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <span class="nav-link" style="color:var(--color-acento);font-weight:600">
            <i class="bi bi-person-circle me-1"></i><span id="userName">Cliente</span>
          </span>
        </li>
        <li><button class="btn btn-sm btn-outline-light" id="btnLogout">
          <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
        </button></li>
      </ul>
    </div>
  </div>
</nav>

<div class="portal-layout">
  <nav class="sidebar d-none d-lg-block">
    <ul class="nav flex-column">
      <li><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
      <li><a class="nav-link active" href="transacciones.html"><i class="bi bi-arrow-left-right"></i> Transacciones</a></li>
      <li><a class="nav-link" href="pagos.html"><i class="bi bi-credit-card"></i> Pagos</a></li>
      <li><a class="nav-link" href="prestamos.html"><i class="bi bi-cash-stack"></i> Préstamos</a></li>
      <li><a class="nav-link" href="ahorro.html"><i class="bi bi-piggy-bank"></i> Ahorro</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <h4 class="fw-bold mb-1"><i class="bi bi-arrow-left-right me-2 text-primary"></i>Historial de Transacciones</h4>
    <p class="text-muted small mb-4">Últimos 20 movimientos de tus cuentas</p>

    <!-- Filtros -->
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-md-3">
            <label class="form-label small fw-semibold">Tipo de movimiento</label>
            <select id="filtroTipo" class="form-select">
              <option value="">Todos</option>
              <option value="debito">Débito (salidas)</option>
              <option value="credito">Crédito (entradas)</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label small fw-semibold">Fecha desde</label>
            <input type="date" id="filtroDesde" class="form-control">
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label small fw-semibold">Fecha hasta</label>
            <input type="date" id="filtroHasta" class="form-control">
          </div>
          <div class="col-12 col-md-3 d-flex gap-2">
            <button class="btn btn-primary flex-fill" id="btnFiltrar">
              <i class="bi bi-search me-1"></i>Filtrar
            </button>
            <button class="btn btn-outline-secondary" id="btnLimpiar">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Resumen rápido -->
    <div class="row g-3 mb-4" id="resumenCards">
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Total movimientos</div>
          <div class="fw-bold fs-4" id="resTotal">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Total débitos</div>
          <div class="fw-bold fs-5 text-danger" id="resDebitos">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Total créditos</div>
          <div class="fw-bold fs-5 text-success" id="resCreditoss">—</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 bg-light text-center p-3">
          <div class="text-muted small">Balance neto</div>
          <div class="fw-bold fs-5" id="resNeto">—</div>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-striped table-hover mb-0" id="tablaTxn">
            <thead class="table-dark">
              <tr>
                <th class="ps-3">Fecha</th>
                <th>Descripción</th>
                <th>Cuenta</th>
                <th>Tipo</th>
                <th class="text-end pe-3">Monto</th>
              </tr>
            </thead>
            <tbody id="txnBody">
              <tr><td colspan="5" class="text-center py-4">
                <div class="spinner-border text-primary"></div>
                <p class="text-muted mt-2 mb-0">Cargando transacciones...</p>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { supabase, requireAuth, formatSoles, formatFecha } from '../js/supabase.js';

  const user = await requireAuth();
  document.getElementById('userName').textContent = user.user_metadata?.full_name?.split(' ')[0] || user.email;

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.replace('/index.html');
  });

  // ── Cargar transacciones con filtros opcionales ────────
  async function cargarTransacciones() {
    const tipo   = document.getElementById('filtroTipo').value;
    const desde  = document.getElementById('filtroDesde').value;
    const hasta  = document.getElementById('filtroHasta').value;

    let query = supabase
      .from('transacciones')
      .select(`*, cuentas(tipo, numero_cuenta)`)
      .eq('user_id', user.id)
      .order('fecha', { ascending: false })
      .limit(20);

    if (tipo)   query = query.eq('tipo', tipo);
    if (desde)  query = query.gte('fecha', desde);
    if (hasta)  query = query.lte('fecha', hasta + 'T23:59:59');

    const { data: txns, error } = await query;
    renderTabla(txns || []);
    renderResumen(txns || []);
  }

  function renderTabla(txns) {
    const tbody = document.getElementById('txnBody');
    if (txns.length === 0) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">
        <i class="bi bi-inbox fs-2 d-block mb-2"></i>No se encontraron transacciones con esos filtros.
      </td></tr>`;
      return;
    }
    tbody.innerHTML = txns.map(t => `
      <tr>
        <td class="ps-3 text-muted small">${formatFecha(t.fecha)}</td>
        <td>
          <div class="d-flex align-items-center gap-2">
            <i class="bi ${t.tipo === 'debito' ? 'bi-arrow-up-right-circle text-danger' : 'bi-arrow-down-left-circle text-success'} fs-5"></i>
            <span class="fw-semibold small">${t.descripcion}</span>
          </div>
        </td>
        <td class="text-muted small">
          ${t.cuentas ? (t.cuentas.tipo === 'corriente' ? 'Cta. Corriente' : 'Cta. Ahorro') : '—'}
        </td>
        <td>
          <span class="badge ${t.tipo === 'debito' ? 'badge-debito' : 'badge-credito'} px-2 py-1">
            ${t.tipo === 'debito' ? 'Débito' : 'Crédito'}
          </span>
        </td>
        <td class="text-end pe-3">
          <span class="${t.tipo === 'debito' ? 'monto-debito' : 'monto-credito'} fw-bold">
            ${t.tipo === 'debito' ? '- ' : '+ '}${formatSoles(t.monto)}
          </span>
        </td>
      </tr>
    `).join('');
  }

  function renderResumen(txns) {
    const debitos  = txns.filter(t => t.tipo === 'debito').reduce((s, t)  => s + Number(t.monto), 0);
    const creditos = txns.filter(t => t.tipo === 'credito').reduce((s, t) => s + Number(t.monto), 0);
    const neto = creditos - debitos;
    document.getElementById('resTotal').textContent    = txns.length;
    document.getElementById('resDebitos').textContent  = formatSoles(debitos);
    document.getElementById('resCreditoss').textContent = formatSoles(creditos);
    const netoEl = document.getElementById('resNeto');
    netoEl.textContent = formatSoles(Math.abs(neto));
    netoEl.className   = `fw-bold fs-5 ${neto >= 0 ? 'text-success' : 'text-danger'}`;
  }

  // Eventos filtros
  document.getElementById('btnFiltrar').addEventListener('click', cargarTransacciones);
  document.getElementById('btnLimpiar').addEventListener('click', () => {
    document.getElementById('filtroTipo').value  = '';
    document.getElementById('filtroDesde').value = '';
    document.getElementById('filtroHasta').value = '';
    cargarTransacciones();
  });

  // Carga inicial
  cargarTransacciones();
</script>
</body>
</html>
